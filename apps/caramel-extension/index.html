<!doctype html>
<html lang="en">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title>Caramel</title>

        <!-- Main stylesheet -->
        <link rel="stylesheet" href="assets/styles.css" />
    </head>

    <body>
        <!-- Loading overlay -->
        <div id="loading-container" class="loading-container">
            <img src="sparkle.svg" alt="loading" />
        </div>

        <!-- Popup UI -->
        <div class="popup-container">
            <header class="popup-header">
                <a
                    href="https://grabcaramel.com"
                    target="_blank"
                    rel="noopener noreferrer"
                >
                    <img
                        src="assets/full-logo-no-bg.png"
                        alt="Caramel Logo"
                        class="popup-logo"
                    />
                </a>

                <!-- Shown only when user is logged in -->
                <div id="settingsIcon" class="profile-settings"></div>
            </header>

            <main id="mainContent">
                <div id="auth-container"></div>
            </main>
        </div>

        <!-- Scripts -->
        <script src="shared-utils.js"></script>
        <script src="UI-helpers.js"></script>
        <script src="popup.js"></script>
    </body>
</html>
